name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Resolve package version
        id: meta
        run: |
          python - <<'PY'
          import ast
          import os
          from pathlib import Path

          module = ast.parse(Path("src/chatlark/__init__.py").read_text(encoding="utf-8"))
          for stmt in module.body:
              if not isinstance(stmt, ast.Assign):
                  continue
              if any(isinstance(target, ast.Name) and target.id == "__version__" for target in stmt.targets):
                  version = ast.literal_eval(stmt.value)
                  break
          else:
              raise SystemExit("__version__ not found in src/chatlark/__init__.py")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={version}", file=output)
              print(f"tag=v{version}", file=output)
          PY
      - name: Check tag matches package version
        if: github.event_name == 'push'
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if [ "${GITHUB_REF_NAME}" != "${RELEASE_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${RELEASE_TAG}."
            exit 1
          fi
      - name: Check tagged commit is on main
        if: github.event_name == 'push'
        run: |
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -q 'origin/main'; then
            echo "Release tag must point to a commit contained in origin/main."
            exit 1
          fi
      - name: Check manual release branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Manual publish must run from main. Current ref: ${GITHUB_REF_NAME}."
            exit 1
          fi
      - name: Check PyPI version is new
        env:
          PACKAGE_NAME: "ChatLark"
          PACKAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          package = os.environ["PACKAGE_NAME"]
          version = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/{urllib.parse.quote(package)}/{urllib.parse.quote(version)}/json"
          try:
              urllib.request.urlopen(url, timeout=10)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"{package} {version} is not on PyPI yet; continuing.")
              else:
                  raise
          else:
              raise SystemExit(f"{package} {version} already exists on PyPI; bump the package version before publishing.")
          PY
      - name: Run tests
        run: python -m pytest -q
      - name: Build and check distribution
        run: |
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
